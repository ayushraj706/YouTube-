      - name: Build Process (Final Force)
        run: |
          npm install
          npx cap add android || true
          npx cap sync
          
          # 1. Purani default files ko jadd se mitao
          rm -rf android/app/src/main/java/com/ayush/ytpro
          mkdir -p android/app/src/main/java/com/ayush/ytpro/
          
          # 2. Files Inject Karo (Forcefully)
          cp -f MainActivity.java android/app/src/main/java/com/ayush/ytpro/MainActivity.java
          cp -f AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          
          # 3. Resources Sync (Logo aur Splash)
          if [ -d "res" ]; then
            cp -rf res/* android/app/src/main/res/
          fi
          
          # 4. DEBUG CHECK: Ye dikhayega ki file wahan hai ya nahi
          echo "Checking if MainActivity exists in destination..."
          ls -l android/app/src/main/java/com/ayush/ytpro/MainActivity.java
          
          # 5. Final Gradle Build
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
