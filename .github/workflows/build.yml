name: Build YouTube APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: uses/actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build Process (Hardcoded)
        run: |
          # 1. Dependencies install karo
          npm install
          
          # 2. Android platform add karo (agar nahi hai toh)
          npx cap add android || true
          
          # 3. Directories create karo (Java aur Resources ke liye)
          mkdir -p android/app/src/main/java/com/ayush/ytpro/
          mkdir -p android/app/src/main/res/drawable/
          mkdir -p android/app/src/main/res/values/
          
          # 4. SAKT CODE INJECTION: MainActivity aur Manifest copy karo
          cp MainActivity.java android/app/src/main/java/com/ayush/ytpro/MainActivity.java
          cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          
          # 5. LOGO & SPLASH SYNC: Jo 'res' folder aapne banaya hai use copy karo
          if [ -d "res" ]; then
            echo "Logo folder mil gaya! Copying resources..."
            cp -r res/* android/app/src/main/res/
          else
            echo "ERROR: 'res' folder nahi mila. Logo missing hoga!"
            exit 1
          fi
          
          # 6. Capacitor Sync (Web files ko Android mein bhejo)
          npx cap copy
          npx cap sync
          
          # 7. GRADLE PERMISSION & BUILD: Sabse sakt part
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Pro-Ultimate
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
