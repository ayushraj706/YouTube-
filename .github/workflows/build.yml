name: Build YouTube APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Process (Extreme Force)
        run: |
          # 1. Basic Setup
          npm install
          npx cap add android || true
          
          # 2. Capacitor Sync (Taki basic structure ban jaye)
          npx cap sync
          
          # 3. SAKT CLEANUP: Capacitor ke purane icons aur MainActivity mitao
          # Ye line zaroori hai taki default logo aapke logo ko na roke
          rm -rf android/app/src/main/res/mipmap-*
          rm -rf android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -rf android/app/src/main/res/drawable-v24/ic_launcher_foreground.xml
          find android/app/src/main/java -name "MainActivity.java" -delete
          
          # 4. DIRECTORY INJECTION: Apne package ki sahi jagah banao
          mkdir -p android/app/src/main/java/com/ayush/ytpro/
          
          # 5. FILE INJECTION: Custom files ko inject karo
          cp -f MainActivity.java android/app/src/main/java/com/ayush/ytpro/MainActivity.java
          cp -f AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          
          # 6. RESOURCE SYNC: Logo aur Splash ko merge karo
          if [ -d "res" ]; then
            echo "Logo folder mil gaya! Copying resources..."
            cp -rf res/* android/app/src/main/res/
          fi
          
          # 7. DEBUG LOGS: Check karo file sahi jagah pahunchi ya nahi
          echo "--- VERIFYING FILES ---"
          ls -R android/app/src/main/java/com/ayush/ytpro/
          
          # 8. FINAL GRADLE BUILD
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Pro-Ultimate
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
