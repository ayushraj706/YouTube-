name: Build YouTube APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Process (Final Force)
        run: |
          # 1. Dependencies aur Platform setup
          npm install
          npx cap add android || true
          npx cap sync
          
          # 2. SAKT CLEANUP: Capacitor ki default MainActivity ko delete karo
          find android/app/src/main/java -name "MainActivity.java" -delete
          
          # 3. DIRECTORY INJECTION: Sahi folder structure banao
          mkdir -p android/app/src/main/java/com/ayush/ytpro/
          
          # 4. FILE COPY: Custom files ko inject karo
          cp -f MainActivity.java android/app/src/main/java/com/ayush/ytpro/MainActivity.java
          cp -f AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          
          # 5. RESOURCE SYNC: Logo aur Splash inject karo
          if [ -d "res" ]; then
            echo "Resources mil gaye! Copying..."
            cp -rf res/* android/app/src/main/res/
          fi
          
          # 6. GRADLE BUILD: Final APK banao
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Pro-Ultimate
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
