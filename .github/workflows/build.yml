name: Build YouTube APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Process
        run: |
          npm install
          npx cap add android || true
          mkdir -p android/app/src/main/java/com/ayush/ytpro/
          cp MainActivity.java android/app/src/main/java/com/ayush/ytpro/MainActivity.java
          cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          npx cap copy && npx cap sync
          cd android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Pro-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
