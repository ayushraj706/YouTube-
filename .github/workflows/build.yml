      - name: Build Process (Hardcoded Final Order)
        run: |
          npm install
          npx cap add android || true
          
          # 1. Pehle Sync karo
          npx cap sync
          
          # 2. PURANI FILES HATAO (Taki koi takrav na ho)
          rm -rf android/app/src/main/java/com/ayush/ytpro/*
          mkdir -p android/app/src/main/java/com/ayush/ytpro/
          
          # 3. APNI FILES INJECT KARO
          cp MainActivity.java android/app/src/main/java/com/ayush/ytpro/MainActivity.java
          cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          
          # 4. Logo aur Resources (Sabse zaroori)
          # Hum poora res folder replace karenge taki koi default file error na de
          if [ -d "res" ]; then
            cp -r res/* android/app/src/main/res/
          fi
          
          # 5. GRADLE BUILD
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
