name: Build YouTube APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Cache hata diya hai taaki 'File Not Found' error na aaye

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Process (Sakt Logic)
        run: |
          # 1. Dependencies install karo
          npm install
          
          # 2. Android platform add karo
          npx cap add android || true
          
          # 3. Directories create karo (Java aur Resources ke liye)
          mkdir -p android/app/src/main/java/com/ayush/ytpro/
          mkdir -p android/app/src/main/res/drawable/
          mkdir -p android/app/src/main/res/values/
          mkdir -p android/app/src/main/res/mipmap-hdpi/
          
          # 4. CODE INJECTION: MainActivity aur Manifest copy karo
          cp MainActivity.java android/app/src/main/java/com/ayush/ytpro/MainActivity.java
          cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          
          # 5. LOGO & RES SYNC: res folder check
          if [ -d "res" ]; then
            echo "Resources found! Syncing logo and splash..."
            cp -r res/* android/app/src/main/res/
          else
            echo "WARNING: 'res' folder nahi mila. Default icon use hoga."
          fi
          
          # 6. Capacitor Sync (Web files ko Android mein bhejo)
          npx cap copy
          npx cap sync
          
          # 7. GRADLE BUILD: APK banao
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Pro-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
