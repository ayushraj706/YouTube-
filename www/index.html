<!DOCTYPE html>
<html>
<head>
    <style>
        /* sponsored aur ads ko puri tarah khatam karo */
        ytm-promoted-video-renderer, ytm-display-ad-renderer, .ad-container, .ad-div { 
            display: none !important; 
        }
    </style>
</head>
<body style="background: #000; margin: 0;">
    <script>
        // Force Video Play in Background
        setInterval(() => {
            const video = document.querySelector('video');
            if (video && video.paused && !video.ended && document.hidden) {
                video.play(); // Agar app piche jaye toh khud 'Play' dabao
            }
            
            // Skip Ads
            const skip = document.querySelector('.ytp-ad-skip-button, .ytp-ad-skip-button-modern');
            if(skip) skip.click();
        }, 1000);

        // Fake Visibility for YouTube
        Object.defineProperty(document, 'visibilityState', {get: () => 'visible'});
        Object.defineProperty(document, 'hidden', {get: () => false});
    </script>
</body>
</html>
