<!DOCTYPE html>
<html>
<body style="background: #000;">
    <script>
        // Ad-blocker aur Skip logic
        setInterval(() => {
            const ads = document.querySelectorAll('.ad-container, .ad-div, .video-ads, .ytp-ad-module, .ytp-ad-overlay-container');
            ads.forEach(ad => ad.style.display = 'none');
            const skipBtn = document.querySelector('.ytp-ad-skip-button-modern');
            if(skipBtn) skipBtn.click();
        }, 1000);

        // Visibility Hack for Background Play
        Object.defineProperty(document, 'visibilityState', {get: () => 'visible'});
        Object.defineProperty(document, 'hidden', {get: () => false});
    </script>
</body>
</html>
