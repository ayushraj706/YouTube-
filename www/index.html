<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Pro Ultimate</title>
    <style>
        /* 1. AGGRESSIVE UI CLEANUP */
        /* YouTube Premium banners, App install prompts aur Ads ko jadd se khatam karo */
        ytm-promoted-video-renderer, ytm-display-ad-renderer, ytm-ad-slot, 
        .ad-container, .ad-div, ytm-companion-ad-renderer,
        ytm-promoted-sparkles-web-renderer, ytm-statement-banner-renderer,
        .ytp-ad-overlay-container, ytm-upsell-dialog-renderer, 
        #player-ads, .ytd-ad-slot-renderer, .yt-pivots-upsell-renderer { 
            display: none !important; 
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
            pointer-events: none !important;
        }

        /* Full Screen Zoom Fix */
        .custom-full-view video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            z-index: 2147483647 !important;
            background: #000 !important;
        }

        body { background: #000; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <script>
        (function() {
            // --- STRATEGY 1: NETWORK INTERCEPTOR (BLOCK ADS BEFORE LOADING) ---
            // Ye code YouTube ke ad-request mangne se pehle hi use block kar dega
            const originalFetch = window.fetch;
            window.fetch = function() {
                const url = arguments[0];
                if (typeof url === 'string' && (url.includes('/ad_break') || url.includes('/get_midroll_info') || url.includes('googleads'))) {
                    return Promise.resolve(new Response(null, { status: 204 }));
                }
                return originalFetch.apply(this, arguments);
            };

            const originalOpen = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function() {
                const url = arguments[1];
                if (typeof url === 'string' && (url.includes('/ad_break') || url.includes('/get_midroll_info') || url.includes('googleads'))) {
                    return; // Request hi mat bhejo
                }
                originalOpen.apply(this, arguments);
            };

            // --- STRATEGY 2: VISIBILITY FREEZE (BACKGROUND PLAYBACK) ---
            // YouTube ko hamesha lagega ki app "Front" par chal rahi hai
            Object.defineProperty(document, 'visibilityState', { get: () => 'visible', configurable: true });
            Object.defineProperty(document, 'hidden', { get: () => false, configurable: true });

            // YouTube ke "VisibilityChange" listener ko deactivate karna
            window.addEventListener('visibilitychange', (e) => e.stopImmediatePropagation(), true);
            window.addEventListener('webkitvisibilitychange', (e) => e.stopImmediatePropagation(), true);
            window.addEventListener('blur', (e) => e.stopImmediatePropagation(), true);

            // --- STRATEGY 3: AGGRESSIVE AD SKIPPER & AUTO-PLAY ---
            const hardController = () => {
                const video = document.querySelector('video');
                if (!video) return;

                // Media Session Setup (Notification bar controls)
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: 'YouTube Pro',
                        artist: 'Ayush Raj',
                        album: 'Ultimate Edition'
                    });
                    navigator.mediaSession.setActionHandler('play', () => video.play());
                    navigator.mediaSession.setActionHandler('pause', () => video.play()); // Pause na ho paye
                }

                // Agar ad dikh rahi hai
                if (document.querySelector('.ad-showing, .ad-interrupting')) {
                    video.muted = true; // Ad ko silent karo
                    video.playbackRate = 16.0; // 16x speed (Fastest)
                    
                    // Skip button detect karke turant click karna
                    const skipBtn = document.querySelector('.ytp-ad-skip-button, .ytp-ad-skip-button-modern');
                    if (skipBtn) skipBtn.click();
                    
                    // Video ko ad ke end tak jump karao
                    if (video.duration > 0) {
                        video.currentTime = video.duration - 0.1;
                    }
                } else {
                    if (video.playbackRate > 1.0) video.playbackRate = 1.0; // Normal speed wapas lao
                }

                // Background auto-play guard
                if (video.paused && !video.ended) {
                    video.play().catch(() => {});
                }
            };

            // Har 200ms par check karo (Dheere check karne se YouTube pakad leta hai)
            setInterval(hardController, 200);

            // --- STRATEGY 4: PREVENT PREMIUM POPUPS ---
            setInterval(() => {
                const dismissButtons = document.querySelectorAll('ytm-upsell-dialog-renderer #dismiss-button, .yt-spec-button-shape-next--tertiary');
                dismissButtons.forEach(btn => btn.click());
            }, 1000);

        })();
    </script>
</body>
</html>
