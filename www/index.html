<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Pro Ultimate</title>
    <style>
        /* 1. AGGRESSIVE CLEANUP - Ads, Banners, aur Prompts ko khatam karo */
        ytm-promoted-video-renderer, ytm-display-ad-renderer, ytm-ad-slot, 
        .ad-container, .ad-div, ytm-companion-ad-renderer,
        ytm-promoted-sparkles-web-renderer, ytm-statement-banner-renderer,
        .ytp-ad-overlay-container, ytm-upsell-dialog-renderer, 
        #player-ads, .ytd-ad-slot-renderer, .yt-pivots-upsell-renderer,
        ytm-mealbar-promo-renderer, .ytm-app-install-banner { 
            display: none !important; 
            visibility: hidden !important;
            height: 0 !important;
        }

        /* 2. SMART FULL-SCREEN FIX */
        video {
            object-fit: contain !important; /* Standard view */
        }
        
        /* Jab aapko poori screen bharni ho (Zoom mode) */
        .zoom-mode video {
            object-fit: cover !important;
        }

        body { background: #000; margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>
    <script>
        (function() {
            // --- STRATEGY 1: AD-BLOCKER (NETWORK LEVEL) ---
            const blockList = ['/ad_break', '/get_midroll_info', 'googleads', 'doubleclick', 'pagead'];
            const originalFetch = window.fetch;
            window.fetch = function() {
                const url = arguments[0];
                if (typeof url === 'string' && blockList.some(ad => url.includes(ad))) {
                    return Promise.resolve(new Response(null, { status: 204 }));
                }
                return originalFetch.apply(this, arguments);
            };

            // --- STRATEGY 2: BACKGROUND PLAY REINFORCED ---
            // Visibility API ko hamesha 'visible' par lock kar do
            const lockVisible = () => {
                Object.defineProperty(document, 'visibilityState', { get: () => 'visible', configurable: true });
                Object.defineProperty(document, 'hidden', { get: () => false, configurable: true });
            };
            lockVisible();

            // YouTube ki pause karne wali events ko block karo
            const preventPause = (e) => {
                if (e.type === 'visibilitychange' || e.type === 'blur' || e.type === 'focusout') {
                    e.stopImmediatePropagation();
                }
            };
            window.addEventListener('visibilitychange', preventPause, true);
            window.addEventListener('blur', preventPause, true);

            // --- STRATEGY 3: HARD CONTROLLER LOOP ---
            setInterval(() => {
                const video = document.querySelector('video');
                if (!video) return;

                // 1. Background Auto-Play (Screen lock hone par bhi chalega)
                if (video.paused && !video.ended) {
                    video.play().catch(() => {});
                }

                // 2. Ad-Skipper Logic (Speed up and skip)
                if (document.querySelector('.ad-showing, .ad-interrupting')) {
                    video.muted = true;
                    video.playbackRate = 16.0;
                    if (video.duration > 0) video.currentTime = video.duration - 0.1;
                    
                    const skipBtn = document.querySelector('.ytp-ad-skip-button, .ytp-ad-skip-button-modern');
                    if (skipBtn) skipBtn.click();
                }

                // 3. Media Session Metadata Update
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: 'YouTube Pro',
                        artist: 'Ayush Raj',
                        artwork: [{ src: 'favicon.ico', sizes: '96x96', type: 'image/png' }]
                    });
                }
            }, 300);

            // --- STRATEGY 4: AUTO-DISMISS POPUPS ---
            setInterval(() => {
                const closeBtns = document.querySelectorAll('.yt-spec-button-shape-next--tertiary, #dismiss-button');
                closeBtns.forEach(btn => btn.click());
            }, 2000);

        })();
    </script>
</body>
</html>
